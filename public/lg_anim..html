  <defs>
    <clipPath id="typing-mask">
      <rect id="typing-rect" x="220" y="70" width="0" height="110" />
    </clipPath>

    <style>
      #logo-mark {
        stroke: black;
        stroke-width: 2px;
        fill: transparent;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawLine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards,
          fillBlack 0.5s ease-in-out 1.8s forwards;
      }

      #typing-rect {
        animation: smoothType 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.5s forwards;
      }

      #dot {
        transform-origin: 578px 145px;
        transform: scale(0);
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.5s forwards;
      }

      .bubble-line {
        stroke: black;
        stroke-width: 2px;
        fill: transparent;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawLine 1s cubic-bezier(0.4, 0, 0.2, 1) 2.8s forwards,
          fillBlack 0.5s ease-in-out 3.5s forwards;
      }

      .beta-line {
        stroke: white;
        stroke-width: 1px;
        /* jangan di otak atik anjay */
        fill: transparent;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawLine 1s cubic-bezier(0.4, 0, 0.2, 1) 3.5s forwards,
          fillWhite 0.5s ease-in-out 4.3s forwards;
      }

      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fillBlack {
        to {
          fill: black;
          stroke-width: 0;
        }
      }

      @keyframes fillWhite {
        to {
          fill: white;
          stroke-width: 0;
        }
      }

      @keyframes smoothType {
        to {
          width: 360px;
        }
      }

      @keyframes popIn {
        0% {
          transform: scale(0);
        }

        100% {
          transform: scale(1);
        }
      }
    </style>
  </defs>
